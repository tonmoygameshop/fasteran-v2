<!DOCTYPE html>
<html lang="en">
<head>
  
  <script src='//libtl.com/sdk.js' data-zone='11124019' data-sdk='show_11124019'></script>
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Egg Casino Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-image: url('https://lh3.googleusercontent.com/d/1ckp83sjZRENVjgq9Q5SJzxO-ROJKYZOX=w600-h600');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Glassmorphism Wrapper */
        .game-container {
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 30, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            color: #fff;
        }

        /* Top Bar Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), 0 5px 15px rgba(0,0,0,0.3);
            animation: float 3s ease-in-out infinite alternate;
        }

        .stat-card.right {
            animation-delay: 1.5s;
        }

        .icon-svg {
            width: 24px;
            height: 24px;
            fill: #ffd700;
        }

        .uid-display {
            font-size: 14px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff007f, #7f00ff);
            padding: 5px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Game Zone / Egg Falling Area */
        .game-zone {
            flex: 1;
            position: relative;
            margin: 20px 0;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .egg-container {
            position: absolute;
            width: 70px;
            height: 70px;
            cursor: pointer;
            transition: transform 0.2s;
            animation: fall 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .egg-container:hover {
            transform: scale(1.1);
        }

        .egg-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Control / Shop Area Footer */
        .footer-zone {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.3);
        }

        .btn-premium {
            background: linear-gradient(135deg, #ff9900, #ff5500);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #b33c00, 0 8px 15px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }

        .btn-premium:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b33c00, 0 4px 6px rgba(0,0,0,0.4);
        }

        .sell-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-premium {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-premium:focus {
            border-color: #ff9900;
        }

        .btn-sell {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            box-shadow: 0 4px 0 #0052b3;
        }
        .btn-sell:active {
            box-shadow: 0 1px 0 #0052b3;
        }

        /* Popups / Modals */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .popup-card {
            background: rgba(30, 25, 50, 0.9);
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .popup-card h2 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        @keyframes fall {
            0% { transform: translateY(-500px) rotate(0deg); opacity: 0; }
            60% { transform: translateY(10px) rotate(15deg); opacity: 1; }
            80% { transform: translateY(-5px) rotate(-10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); filter: brightness(1.5); }
            100% { transform: scale(1); opacity: 1; }
        }

        .claimed {
            animation: explode 0.5s ease-out;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Login Popup -->
    <div id="loginPopup" class="overlay">
        <div class="popup-card">
            <h2>ENTER GAME UID</h2>
            <input type="text" id="uidInput" class="input-premium" placeholder="Paste your UID here..." style="margin-bottom: 20px; text-align: center; font-size: 18px;">
            <button onclick="loginUser()" class="btn-premium" style="width: 100%;">LET'S PLAY</button>
        </div>
    </div>

    <!-- Main Game App Interface -->
    <div class="game-container">
        
        <!-- Top Statistics -->
        <div class="top-bar">
            <div class="stat-card">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 16h-2v-2h2v2zm1.07-7.75l-.9.92C12.45 11.9 12 12.5 12 14h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/></svg>
                <div>
                    <div style="font-size: 10px; color: #aaa;">TOTAL COINS</div>
                    <div id="coinText" style="font-size: 18px; font-weight: bold; color: #ffd700;">0</div>
                </div>
            </div>

            <div class="uid-display" id="userUidDisplay">UID: ------</div>

            <div class="stat-card right">
                <svg class="icon-svg" style="fill: #ff3366;" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <div>
                    <div style="font-size: 10px; color: #aaa;">EGGS CRACKED</div>
                    <div id="eggCountText" style="font-size: 18px; font-weight: bold; color: #ff3366;">0</div>
                </div>
            </div>
        </div>

        <!-- Egg Cracking Area -->
        <div class="game-zone" id="gameZone">
            <!-- Eggs will be generated dynamically here -->
            <div id="gameStatusMessage" style="font-size: 20px; color: rgba(255,255,255,0.6); text-align: center; font-weight: bold; text-transform: uppercase;">Press START FREE to Play</div>
        </div>

        <!-- Footer / Operations -->
        <div class="footer-zone">
            <button id="startBtn" class="btn-premium" onclick="startGame()">START FREE</button>
            
            <div class="sell-box">
                <input type="number" id="sellAmount" class="input-premium" placeholder="Amount of coins to sell">
                <button class="btn-premium btn-sell" onclick="requestCoinSell()">SELL COINS</button>
            </div>
        </div>
    </div>

    <!-- Firebase JS SDK Config & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoWB0sp1zdfr_b-FaEVFeGaIXfT0FfUpw",
            authDomain: "survpay-c7ae1.firebaseapp.com",
            databaseURL: "https://survpay-c7ae1-default-rtdb.firebaseio.com",
            projectId: "survpay-c7ae1",
            storageBucket: "survpay-c7ae1.firebasestorage.app",
            messagingSenderId: "554708179537",
            appId: "1:554708179537:web:991cf3caa91b8554e1f670",
            measurementId: "G-BPX8BCCENH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUID = "";
        let userData = { coins: 0, eggsCracked: 0 };
        let isGameActive = false;

// --- অটোমেটিক অ্যাড সিস্টেম (প্রতি ১০ সেকেন্ড পর পর) ---
setInterval(() => {
    // গেম চলাকালীন বা ইউজার যখন অ্যাপে একটিভ থাকবে, তখন এটি কাজ করবে
    console.log("Loading Advertisement...");
    
    // আপনার দেওয়া অ্যাড শো করার ফাংশন
    show_11124019('pop').then(() => {
        // ইউজার সম্পূর্ণ অ্যাডটি দেখেছে অথবা ক্লোজ করেছে
        console.log("Ad watched successfully or closed.");
        
        // উদাহরণ: অ্যাড দেখার জন্য ইউজারকে বোনাস ১টি কয়েন দিতে চাইলে নিচের কোডটি চালু করতে পারেন
        /*
        if (currentUID) {
            userData.coins += 1;
            updateUI();
            // ডাটাবেজে আপডেট করার জন্য
            const { getDatabase, ref, update } = window.FirebaseDB; // অথবা আপনার ইমপোর্ট করা ভেরিয়েবল
            update(ref(db, `users/${currentUID}`), { coins: userData.coins });
        }
        */
    }).catch(e => {
        // অ্যাড লোড হতে কোনো সমস্যা হলে বা ইউজার কেটে দিলে এই অংশ কাজ করবে
        console.error("Ad failed to load or error occurred: ", e);
    });

}, 10000); // ১০,০০০ মিলিসেকেন্ড = ১০ সেকেন্ড

        // Reward Table Configuration (100 games cycle logic helper)
        const rewardsPool = [
            ...Array(43).fill(0),
            ...Array(30).fill(1),
            ...Array(20).fill(5),
            ...Array(5).fill(10),
            ...Array(2).fill(20)
        ];

        window.loginUser = async function() {
            const uidInput = document.getElementById('uidInput').value.trim();
            if(!uidInput) return alert("Please enter a valid UID!");
            
            currentUID = uidInput;
            const dbRef = ref(db);
            
            try {
                const snapshot = await get(child(dbRef, `users/${currentUID}`));
                if (snapshot.exists()) {
                    userData = snapshot.val();
                } else {
                    userData = { coins: 0, eggsCracked: 0, uid: currentUID };
                    await set(ref(db, `users/${currentUID}`), userData);
                }
                
                document.getElementById('userUidDisplay').innerText = `UID: ${currentUID}`;
                updateUI();
                document.getElementById('loginPopup').classList.add('hidden');
            } catch(error) {
                alert("Database Error: " + error.message);
            }
        }

        function updateUI() {
            document.getElementById('coinText').innerText = userData.coins;
            document.getElementById('eggCountText').innerText = userData.eggsCracked;
        }

        window.startGame = function() {
            if(isGameActive) return;
            isGameActive = true;
            
            const gameZone = document.getElementById('gameZone');
            gameZone.innerHTML = ""; 

            // Logic to preset reward from Server-side calculation simulation
            const randomIndex = Math.floor(Math.random() * rewardsPool.length);
            const serverPreDeterminedReward = rewardsPool[randomIndex];

            const totalEggs = Math.floor(Math.random() * 6) + 10; // 10 to 15 eggs
            const luckyEggIndex = Math.floor(Math.random() * totalEggs);

            for(let i=0; i<totalEggs; i++) {
                const egg = document.createElement('div');
                egg.className = 'egg-container';
                
                // Random position inside container
                const posX = Math.floor(Math.random() * (gameZone.clientWidth - 80));
                const posY = Math.floor(Math.random() * (gameZone.clientHeight - 80));
                egg.style.left = posX + 'px';
                egg.style.top = posY + 'px';
                egg.style.animationDelay = (i * 0.05) + 's';

                const img = document.createElement('img');
                img.src = "https://lh3.googleusercontent.com/d/1EJnEBofBYzyk1w13-q7MMGmFUwcDSgpQ=w600-h600";
                img.className = 'egg-img';
                egg.appendChild(img);

                // Click event
                egg.onclick = function() {
                    if(!isGameActive) return;
                    // Freeze action
                    isGameActive = false; 
                    
                    // Trigger crack graphics and animations
                    img.src = "https://lh3.googleusercontent.com/d/1fHa504k6lDNZrArUEgYd_f61LduuZ_Rq=w600-h600";
                    egg.classList.add('claimed');

                    // Calculate final award based on pre-calculated server rule
                    const finalReward = (i === luckyEggIndex) ? serverPreDeterminedReward : 0;

                    setTimeout(async () => {
                        userData.coins += finalReward;
                        userData.eggsCracked += 1;
                        
                        await update(ref(db, `users/${currentUID}`), {
                            coins: userData.coins,
                            eggsCracked: userData.eggsCracked
                        });
                        
                        updateUI();
                        alert(`You found: ${finalReward} COINS!`);
                        gameZone.innerHTML = `<div style="font-size: 20px; color: #fff;">Got ${finalReward} Coins! Press Start to play again.</div>`;
                    }, 600);
                };

                gameZone.appendChild(egg);
            }
        }

        window.requestCoinSell = async function() {
            const amount = parseInt(document.getElementById('sellAmount').value);
            if(!amount || amount <= 0) return alert("Enter a valid number of coins!");
            if(amount > userData.coins) return alert("Insufficient coins inside your wallet!");

            const requestID = Date.now();
            const sellRequest = {
                uid: currentUID,
                amount: amount,
                timestamp: requestID,
                status: "pending"
            };

            await set(ref(db, `requests/${requestID}`), sellRequest);
            alert("Sell request submitted successfully to Admin Panel!");
            document.getElementById('sellAmount').value = "";
        }
    </script>
</body>
</html>
